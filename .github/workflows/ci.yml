---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: every job here only reads the repo (checkout, build, test, cache). Jobs that
# need more should add a narrower job-level permissions block rather than widening this default.
permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - uses: esphome/pre-commit-action@43cd1109c09c544d97196f7730ee5b2e0cc6d81e # v3.0.1 fork with pinned actions/cache

  lint:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy

      - name: Run clang-tidy
        run: ./script/clang-tidy.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Configure CMake
        run: cmake -B build host_examples/opus_to_wav

      - name: Build
        run: cmake --build build

  test:
    name: Unit tests (${{ matrix.alloc_mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Run the suite under each memory-allocation mode so the always-on stack_alloc patch and the
        # thread-local pseudostack are exercised in every configuration, all under ASan/UBSan.
        alloc_mode: [THREADSAFE_PSEUDOSTACK, NONTHREADSAFE_PSEUDOSTACK, USE_ALLOCA]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Configure CMake with sanitizers
        run: >
          cmake -B build -DENABLE_SANITIZERS=ON
          -DOPUS_ALLOCATION_MODE=${{ matrix.alloc_mode }} tests

      - name: Build
        run: cmake --build build

      - name: Run unit tests
        run: ctest --test-dir build -L unit --output-on-failure

  conformance:
    name: opus_compare conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      # The RFC 8251 test vectors are static; cache them so we don't re-download every run. Keying on
      # the fetch script means the cache auto-invalidates if the vector URL ever changes.
      - name: Cache test vectors
        id: cache-vectors
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tests/vectors
          key: opus-testvectors-${{ hashFiles('tests/fetch_vectors.sh') }}

      - name: Download test vectors
        if: steps.cache-vectors.outputs.cache-hit != 'true'
        run: tests/fetch_vectors.sh

      - name: Configure CMake
        run: cmake -B build tests

      - name: Build
        run: cmake --build build

      # Decode the official vectors with our decoder and validate each against its reference
      # decode with opus_compare. Run without sanitizers: opus_compare's FFT analysis over the long
      # vectors is slow, and our decoder is already exercised under ASan in the unit-test job.
      - name: Run conformance tests
        run: ctest --test-dir build -L conformance --output-on-failure

  platformio:
    name: PlatformIO Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [decode_benchmark, encode_benchmark]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.platformio
            examples/${{ matrix.example }}/.pio
          key: pio-${{ matrix.example }}-${{ hashFiles('examples/${{ matrix.example }}/platformio.ini') }}
          restore-keys: |
            pio-${{ matrix.example }}-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build ${{ matrix.example }}
        run: pio run -d examples/${{ matrix.example }}
