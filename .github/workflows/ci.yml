---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # `labeled` lets the `ci-run-qemu` label start a run. Every job except changes/cross-qemu is
    # gated on `github.event.action != 'labeled'`, so labeling re-runs only QEMU, not the whole suite.
    types: [opened, synchronize, reopened, labeled]
  # Manual "Run workflow" from the Actions tab. The changes job's fail-safe (unreachable base) runs
  # the full suite including QEMU on a dispatch, which is what you want from a manual trigger.
  workflow_dispatch:

# Least privilege: every job here only reads the repo (checkout, build, test, cache). Jobs that
# need more should add a narrower job-level permissions block rather than widening this default.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Don't cancel an in-progress run when a label is added. The `labeled` trigger fires for every
  # label (it exists so `ci-run-qemu` can force a QEMU run), and a labeled event shares this group,
  # so cancelling here would kill a running suite just because the PR was labeled. New commits
  # (push/synchronize) still supersede a run.
  cancel-in-progress: ${{ github.event.action != 'labeled' }}

jobs:
  pre-commit:
    name: Pre-commit checks
    # Skip on label-only events so labeling runs only the QEMU job (see pull_request types).
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - uses: esphome/pre-commit-action@43cd1109c09c544d97196f7730ee5b2e0cc6d81e # v3.0.1 fork with pinned actions/cache

  lint:
    name: Static analysis
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: false

      - name: Initialize library submodules
        run: git submodule update --init --depth 1 lib/opus lib/micro-ogg-demuxer

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-18

      - name: Run clang-tidy
        env:
          CLANG_TIDY: clang-tidy-18
        run: ./script/clang-tidy.sh

  build:
    name: Build
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # libopus is ~260 .c files rebuilt from scratch in every host job; ccache reuses objects across runs.
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: false

      - name: Initialize library submodules
        run: git submodule update --init --depth 1 lib/opus lib/micro-ogg-demuxer

      - name: Install ccache
        run: sudo apt-get update && sudo apt-get install -y ccache

      - name: Cache ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-build-${{ github.sha }}
          restore-keys: ccache-build-

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          host_examples/opus_to_wav

      - name: Build
        run: cmake --build build

  test:
    name: Unit tests (${{ matrix.alloc_mode }})
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    strategy:
      fail-fast: false
      matrix:
        # Run the suite under each memory-allocation mode so the always-on stack_alloc patch and the
        # thread-local pseudostack are exercised in every configuration, all under ASan/UBSan.
        alloc_mode: [THREADSAFE_PSEUDOSTACK, NONTHREADSAFE_PSEUDOSTACK, USE_ALLOCA]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: false

      - name: Initialize library submodules
        run: git submodule update --init --depth 1 lib/opus lib/micro-ogg-demuxer

      - name: Install ccache
        run: sudo apt-get update && sudo apt-get install -y ccache

      - name: Cache ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-test-${{ matrix.alloc_mode }}-${{ github.sha }}
          restore-keys: ccache-test-${{ matrix.alloc_mode }}-

      - name: Configure CMake with sanitizers
        run: >
          cmake -B build -DENABLE_SANITIZERS=ON
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DOPUS_ALLOCATION_MODE=${{ matrix.alloc_mode }} tests

      - name: Build
        run: cmake --build build

      - name: Run unit tests
        run: ctest --test-dir build -L unit --output-on-failure

  conformance:
    name: opus_compare conformance
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: false

      - name: Initialize library submodules
        run: git submodule update --init --depth 1 lib/opus lib/micro-ogg-demuxer

      - name: Install ccache
        run: sudo apt-get update && sudo apt-get install -y ccache

      - name: Cache ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-conformance-${{ github.sha }}
          restore-keys: ccache-conformance-

      # The RFC 8251 test vectors are static; cache them so we don't re-download every run. Keying on
      # the fetch script means the cache auto-invalidates if the vector URL ever changes.
      - name: Cache test vectors
        id: cache-vectors
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tests/vectors
          key: opus-testvectors-${{ hashFiles('tests/fetch_vectors.sh') }}

      - name: Download test vectors
        if: steps.cache-vectors.outputs.cache-hit != 'true'
        run: tests/fetch_vectors.sh

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          tests

      - name: Build
        run: cmake --build build

      # Decode the official vectors with our decoder and validate each against its reference
      # decode with opus_compare. Run without sanitizers: opus_compare's FFT analysis over the long
      # vectors is slow, and our decoder is already exercised under ASan in the unit-test job.
      - name: Run conformance tests
        run: ctest --test-dir build -L conformance --output-on-failure

  # Decide whether the on-target build changed. The QEMU run only adds value for Xtensa codegen (the
  # patches/ asm and fixed-point paths); the src/ wrapper is already covered on host, so wrapper-only
  # changes skip it. A job skipped via `if:` reports "skipped", which branch protection treats as passing.
  changes:
    name: Detect on-target changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      target: ${{ steps.filter.outputs.target }}
    steps:
      # Full history so the diff base (PR base or previous push tip) is reachable.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Detect changes to on-target build inputs
        id: filter
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          # Run QEMU only when the on-target image could change. A lib/opus submodule bump appears as
          # a change to the gitlink path. The src/ and include/ wrapper is omitted on purpose; host
          # jobs already cover it. Fail safe: run QEMU if the base commit is unreachable (force-push,
          # first push, shallow clone).
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "Base ${BASE_SHA} unreachable; running QEMU job to be safe."
            echo "target=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "${BASE_SHA}...HEAD")"
          echo "Changed files:"
          echo "${changed}"
          if echo "${changed}" | grep -qE '^(lib/opus$|patches/|cmake/staging\.cmake$|tests/qemu/|\.github/workflows/ci\.yml$)'; then
            echo "target=true" >> "$GITHUB_OUTPUT"
          else
            echo "target=false" >> "$GITHUB_OUTPUT"
          fi

  cross-qemu:
    name: Cross (Xtensa QEMU conformance, ${{ matrix.variant }})
    needs: changes
    # Skip on wrapper-only changes. Add the `ci-run-qemu` label to force a run. On a `labeled` event
    # only that label triggers QEMU, so adding an unrelated label doesn't kick off a redundant run.
    if: >
      (github.event.action != 'labeled' && needs.changes.outputs.target == 'true') ||
      contains(github.event.pull_request.labels.*.name, 'ci-run-qemu')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # esp-idf version matches the PlatformIO framework (esp-idf v5.4.x) so the
    # xtensa-gcc codegen is the same as the local run. Xtensa emulation is
    # native-speed on the amd64 runner.
    container: espressif/idf:v5.4.1
    # Float is the ESP32-S3 default; fixed layers sdkconfig.fixed.defaults to
    # exercise the fixed-point decode path and fixed_lx7.h. Separate runners so
    # the two QEMU runs go in parallel.
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: float
            sdkconfig_defaults: sdkconfig.defaults
          - variant: fixed
            sdkconfig_defaults: sdkconfig.defaults;sdkconfig.fixed.defaults
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: false

      - name: Initialize component submodules
        run: |
          git config --global --add safe.directory '*'
          git submodule update --init --depth 1 lib/opus lib/micro-ogg-demuxer

      # Same static-vector cache as the host conformance job. The vectors must be
      # present before the firmware is built: embed_vectors.py bakes them into the
      # app image at configure time.
      - name: Cache test vectors
        id: cache-vectors
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tests/vectors
          key: opus-testvectors-${{ hashFiles('tests/fetch_vectors.sh') }}

      - name: Download test vectors
        if: steps.cache-vectors.outputs.cache-hit != 'true'
        run: tests/fetch_vectors.sh

      - name: Install QEMU (xtensa)
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          python "$IDF_PATH/tools/idf_tools.py" install qemu-xtensa

      - name: Build conformance firmware (idf.py, esp32s3)
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py -C tests/qemu \
            -DSDKCONFIG_DEFAULTS="${{ matrix.sdkconfig_defaults }}" \
            set-target esp32s3 build

      - name: Decode vectors under QEMU and compare on host
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          QEMU_XTENSA="$(command -v qemu-system-xtensa)"
          [ -n "$QEMU_XTENSA" ] || { echo "qemu-system-xtensa not found on PATH after install"; exit 1; }
          export QEMU_XTENSA
          cc -O2 -o /tmp/opus_compare lib/opus/src/opus_compare.c -lm
          tests/qemu/run-image.sh \
            tests/qemu/build/bootloader/bootloader.bin \
            tests/qemu/build/partition_table/partition-table.bin \
            tests/qemu/build/qemu_opus_test.bin \
            /tmp/qemu.log \
            --timeout 900
          tests/qemu/compare.sh /tmp/qemu.log /tmp/opus_compare tests/vectors /tmp

  platformio:
    name: PlatformIO Build
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        example: [decode_benchmark, encode_benchmark]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: false

      - name: Initialize library submodules
        run: git submodule update --init --depth 1 lib/opus lib/micro-ogg-demuxer

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.platformio
            examples/${{ matrix.example }}/.pio
          key: pio-${{ matrix.example }}-${{ hashFiles('examples/${{ matrix.example }}/platformio.ini') }}
          restore-keys: |
            pio-${{ matrix.example }}-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build ${{ matrix.example }}
        run: pio run -d examples/${{ matrix.example }}

  # Single aggregating status for branch protection: require only "CI success" instead of every job.
  # always() so it reports even when a job fails or the conditional cross-qemu job is skipped; skipped
  # dependencies are treated as passing (only failure/cancelled blocks).
  ci-success:
    name: CI success
    if: always()
    needs:
      - pre-commit
      - lint
      - build
      - test
      - conformance
      - changes
      - cross-qemu
      - platformio
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more CI jobs failed or were cancelled:"
          echo '${{ toJSON(needs) }}'
          exit 1

      - name: Report success
        run: echo "All required CI jobs passed (skipped jobs are allowed)."
