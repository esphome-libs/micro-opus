[platformio]
; Source lives in main/ so the project also builds with native idf.py (CI),
; which requires a component named main. This points PlatformIO at the same dir.
src_dir = main

[env:esp32s3]
; Same platform/framework as examples/decode_benchmark so the toolchain (and thus
; the xtensa-gcc codegen) matches.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
framework = espidf
; PSRAM is intentionally left disabled via sdkconfig.defaults (see that file), so
; the board choice only affects flash/partition defaults here.
board = esp32-s3-devkitc-1
; Pin flash to 16MB so the firmware image header matches the 16MB image
; run-image.sh assembles for the QEMU esp32s3 machine, and so the embedded
; vectors fit the custom factory partition (see partitions.csv).
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
monitor_speed = 115200

; Fixed-point variant: same target and image layout, but layers
; sdkconfig.fixed.defaults to force CONFIG_OPUS_FLOATING_POINT=n. This exercises
; the fixed-point decode path and fixed_lx7.h, which the float build above never
; compiles. run-image.sh and compare.sh are unchanged (identical esp32s3 image).
[env:esp32s3_fixed]
extends = env:esp32s3
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS='sdkconfig.defaults;sdkconfig.fixed.defaults'
